          "@type": "Question",
          "name": "What is ETF overlap and why does it matter?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ETF overlap occurs when two or more ETFs in your portfolio hold the same underlying stocks or assets. High overlap means you are less diversified than you think — you are effectively doubling down on the same companies. For example, the Satrix Top 40 (STX40) and Satrix SWIX Top 40 (STXSWX) share many JSE-listed stocks, leading to significant overlap. Checking overlap helps South African investors avoid hidden concentration risk, especially in tax-free savings accounts (TFSAs) where contribution limits are capped."
          }
        },
        {
          "@type": "Question",
          "name": "How does the Zuka Insights ETF Overlap Analyzer work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The tool compares the holdings of two JSE-listed ETFs side by side. It calculates a weight-based overlap score by finding the minimum weight of each stock held in both funds and summing those minimums. A score of 0% means no shared holdings, while 100% means the funds are identical. Results include a visual Venn diagram, a sortable table of shared holdings with their individual weights, and a GICS-aligned sector breakdown comparison."
          }
        },
        {
          "@type": "Question",
          "name": "Which South African ETFs can I compare on Zuka Insights?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Zuka Insights currently supports 10+ ETFs listed on the Johannesburg Stock Exchange (JSE) and international markets, including: Satrix Top 40 (STX40), Satrix 500 (STX500), Satrix Capped All Share (STXCAP), Satrix ALSI (STXALS), Satrix Balanced (STXBAL), Satrix Money Market (STXMMT), Satrix Industrial (STXID), Satrix MSCI World (STXGLB), CoreShares S&P 500 (CSP500), and Satrix Nasdaq 100 (STXNDQ). Holdings data is sourced from public factsheets and updated periodically."
          }
        },
        {
          "@type": "Question",
          "name": "Is the Zuka Insights ETF Overlap tool free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, the Zuka Insights ETF Overlap Analyzer is completely free to use. It is an educational tool designed for South African retail investors, financial advisors, and ETF researchers. No registration or account is required — simply select two ETFs and click Analyze."
          }
        },
        {
          "@type": "Question",
          "name": "Can I compare South African ETFs with international ETFs?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The tool detects cross-market comparisons (e.g., a JSE equity ETF vs a US-listed index ETF) and disables the overlap score for accuracy. Tickers can represent different companies across markets — for example, JSE ticker SPG (Super Group) vs US ticker SPG (Simon Property Group). You can still view individual sector breakdowns for each fund."
          }
        },
        {
          "@type": "Question",
          "name": "How do I reduce ETF overlap in my TFSA portfolio?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "To reduce overlap in your Tax-Free Savings Account (TFSA): 1) Use an overlap tool like Zuka Insights to identify which ETFs share holdings. 2) Choose ETFs that track different indices or markets — e.g. pair a local equity ETF (STX40) with an international ETF (CSP500 or STXNDQ). 3) Consider adding asset classes like bonds (STXGOV) or property (STXPRO) for true diversification. 4) Avoid holding multiple large-cap SA equity ETFs as they tend to overlap heavily on the top JSE stocks."
          }
        }
