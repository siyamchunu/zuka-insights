name: Update ETF Data

on:
  schedule:
    - cron: '0 4 * * 1'  # Monday 06:00 SAST (04:00 UTC)
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pandas
      - run: python scripts/update_sp500_holdings.py
      - name: Validate JSON
        run: python -c "import json; json.load(open('public/data/etfs.json'))"
      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/data/etfs.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT
      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/etfs.json
          git commit -m "chore: update ETF holdings data [$(date +%Y-%m-%d)]"
          git push
